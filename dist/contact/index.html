<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/gallery.css">

    <title>Joy Star's Story</title>
  </head>
  <body>
    <div id="header">
      <div class="white-line"></div>
      <div class="navigation">
	<a href="/">Home</a>
	<a href="/gallery/">Gallery</a>
	<a href="/jurys/">Jurys</a>
	<a href="/contact/">Contact</a>
      </div>
      <script>
	const activeLink = document.querySelector('.navigation a[href="' + location.pathname + '"]');
	if (activeLink) { activeLink.classList.add('active'); }
      </script>
      <img class="top-moons" src="/images/top_moons.png" />
      <div class="white-line"></div>
    </div>
    <div class="content-background">
      <div class="content">
        <h2>Contact me</h2>

        <p class="notification">
          Message sent
          <svg class="close" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="10" stroke="black" stroke-width="1.5"/>
            <path d="M15 9L9 15" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M9 9L15 15" stroke="black" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </p>
        <script>
          notification = document.querySelector('.notification');

          if (location.hash === '#thank-you') notification.style.display = 'block';

          notification.querySelector('.close').addEventListener(
            'click',
            function() { notification.style.display = 'none'; }
          );
        </script>

        <form class="contact-form" action="https://api.staticforms.dev/submit" method="POST">

          <div class="two-columns">
            <p>
              <label for="contact-name">Name:</label>
              <br />
              <input type="text" id="contact-name" name="name" required />
            </p>

            <p>
              <label for="contact-email">Email:</label>
              <br />
              <input type="email" id="contact-email" name="email" required />
            </p>
          </div>

          <p>
            <label for="contact-message">Message:</label>
            <br />
            <textarea id="contact-message" name="message" rows="6" required></textarea>
          </p>

          <input type="hidden" name="apiKey" value="sf_dkd6590364ic241k47cbdk5a" />
          <input class="redirect-to" type="hidden" name="redirectTo" value="" />
          <script>
            document.querySelector('.redirect-to').value = 'https://' + location.host + '/contact_us/#thank-you';
          </script>

          <p class="submit-button">
            <button type="submit">Send Message</button>
          </p>
        </form>
      </div>
    </div>
    <div id="footer">
      ©2020 by Joy Star's Story.
    </div>
  </body>
</html>
